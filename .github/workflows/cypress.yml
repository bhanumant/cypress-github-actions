name: Cypress Multi Browser Tests

on:
  push:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress Tests
        run: |
          npx cypress run \
          --browser ${{ matrix.browser }} \
          --spec "$(node scripts/shard-specs.js ${{ matrix.shardIndex }} ${{ matrix.shardTotal }})"
